name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  build-test-pack-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore MarpToPptx.slnx

      - name: Build
        run: dotnet build MarpToPptx.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test MarpToPptx.slnx --configuration Release --no-build

      - name: Pack CLI Tool
        run: dotnet pack src/MarpToPptx.Cli/MarpToPptx.Cli.csproj --configuration Release --no-build

      - name: NuGet Login
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish Package
        run: dotnet nuget push artifacts/nupkg/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
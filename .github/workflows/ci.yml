name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test-pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore MarpToPptx.slnx

      - name: Build
        run: dotnet build MarpToPptx.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test --solution MarpToPptx.slnx --configuration Release --no-build

      - name: Pack CLI Tool
        run: dotnet pack src/MarpToPptx.Cli/MarpToPptx.Cli.csproj --configuration Release --no-build

      - name: Upload Tool Package
        uses: actions/upload-artifact@v4
        with:
          name: marp2pptx-nupkg
          path: artifacts/nupkg/*.nupkg
          if-no-files-found: error

  smoke-test:
    needs: build-test-pack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore MarpToPptx.slnx

      - name: Run PPTX Smoke Test
        shell: pwsh
        run: |
          ./scripts/Invoke-PptxSmokeTest.ps1 -InputMarkdown samples/01-minimal.md -Configuration Release -CiSafe
          ./scripts/Invoke-PptxSmokeTest.ps1 -InputMarkdown samples/02-directives.md -Configuration Release -CiSafe
          ./scripts/Invoke-PptxSmokeTest.ps1 -InputMarkdown samples/03-theme-css.md -ThemeCss samples/03-theme.css -Configuration Release -CiSafe
          ./scripts/Invoke-PptxSmokeTest.ps1 -InputMarkdown samples/04-content-coverage.md -Configuration Release -CiSafe

      - name: Run Remote Asset Smoke Test
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          ./scripts/Invoke-PptxSmokeTest.ps1 `
            -InputMarkdown samples/06-remote-assets.md `
            -Configuration Release `
            -AllowRemoteAssets `
            -CiSafe

      - name: Upload Smoke Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: marp2pptx-smoke-test-artifacts
          path: artifacts/smoke-tests/*
          if-no-files-found: warn
